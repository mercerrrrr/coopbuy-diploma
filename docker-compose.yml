services:
  postgres:
    image: postgres:16-alpine
    container_name: coopbuy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: coopbuy
      POSTGRES_PASSWORD: coopbuy123
      POSTGRES_DB: coopbuy_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coopbuy -d coopbuy_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
